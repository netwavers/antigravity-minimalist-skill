name: Minimalist Skill Lint

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Minimalist Check
        run: |
          # ファイルを再検索
          TARGET_FILE=$(find . -name "minimalist_control.md" | head -n 1)
          
          if [ -z "$TARGET_FILE" ]; then
            echo "❌ ERROR: File not found!"
            exit 1
          fi
          echo "✅ Found: $TARGET_FILE"
          
          # 必須キーワードの存在確認（個別チェック）
          echo "Checking Mandatory Keywords..."
          grep -qi "Termination Gates" "$TARGET_FILE" || (echo "❌ MISSING: 'Termination Gates'"; exit 1)
          grep -qi "Draft-First" "$TARGET_FILE" || (echo "❌ MISSING: 'Draft-First'"; exit 1)
          grep -qi "Diff-Only" "$TARGET_FILE" || (echo "❌ MISSING: 'Diff-Only'"; exit 1)
          
          echo "✨ All minimalist checks passed! 🐾"